context:
  version: VERSION_PLACEHOLDER

package:
  name: r-pecotmr
  version: ${{ version }}

source:
  path: pecotmr-${{ version }}.tar.gz
  sha256: SHA256SUM_PLACEHOLDER

build:
  number: BUILD_PLACEHOLDER
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/
  script: R CMD INSTALL --build .

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
  host:
    - bioconductor-iranges
    - bioconductor-qvalue
    - bioconductor-s4vectors
    - bioconductor-snprelate
    - bioconductor-snpstats
    - bioconductor-mungesumstats
    - bioconductor-rsamtools
    - r-base
    - r-bglr
    - r-bigsnpr
    - r-coda
    - r-coloc
    - r-colocboost
    - r-cpp11
    - r-cpp11armadillo
    - r-decor
    - r-dofuture
    - r-dplyr
    - r-flashier
    - r-fsusier
    - r-furrr
    - r-future
    - r-gbj
    - r-glmnet
    - r-harmonicmeanp
    - r-igraph
    - r-l0learn
    - r-magrittr
    - r-mashr
    - r-matrixstats
    - r-mr.ash.alpha
    - r-mr.mashr
    - r-mvsusier
    - r-ncvreg
    - r-nnls
    - r-pgenlibr
    - r-purrr
    - r-qgg
    - r-quadprog
    - r-rcppdpr
    - r-readr
    - r-rfast
    - r-rlang
    - r-stringr
    - r-susier
    - r-tibble
    - r-tidyr
    - r-vctrs
    - r-vroom
  run:
    - bioconductor-biostrings
    - bioconductor-iranges
    - bioconductor-qvalue
    - bioconductor-s4vectors
    - bioconductor-snpstats
    - r-base
    - r-bglr
    - r-bigsnpr
    - r-coda
    - r-coloc
    - r-colocboost
    - r-dofuture
    - r-dplyr
    - r-flashier
    - r-fsusier
    - r-furrr
    - r-future
    - r-gbj
    - r-glmnet
    - r-harmonicmeanp
    - r-igraph
    - r-l0learn
    - r-magrittr
    - r-mashr
    - r-matrixstats
    - r-mr.ash.alpha
    - r-mr.mashr
    - r-mvsusier
    - r-ncvreg
    - r-nnls
    - r-pgenlibr
    - r-purrr
    - r-qgg
    - r-rcpp
    - r-rcpparmadillo
    - r-rcppdpr
    - r-readr
    - r-rfast
    - r-rlang
    - r-stringr
    - r-susier
    - r-tibble
    - r-tidyr
    - r-vctrs
    - r-vroom

tests:
  - script:
      - R -e "library('pecotmr')"

about:
  license: MIT
  license_file: LICENSE
  summary: pecotmr implements pair-wise enrichment, colocalization, TWAS and Mendelian Randomization to integrate QTL and GWAS analysis based on a fine-mapped single effects model.
  homepage: https://github.com/StatFunGen/pecotmr

extra:
  recipe-maintainers:
    - danielnachun
